version: "3.8"

services:

  backend:
    container_name: node-backend
    build: ./backend

    ports:
      - "5000:5000"

    depends_on:
      - mongo

    environment:
      MONGO_URL: "mongodb://mongodb:27017/studentdb"

    networks:
      - app-network

    restart: always

  mongo:
    image: mongo:latest
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - app-network

    restart: always

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge